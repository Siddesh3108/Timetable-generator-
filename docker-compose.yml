services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timetable-backend
    ports:
      - "5000:5000"
    # *** ADD THIS BLOCK ***
    # This tells the backend service to load variables from the .env file
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
    command: celery -A celery_worker.celery_app worker --loglevel=info
    container_name: timetable-celery
    # *** ADD THIS BLOCK ***
    # The celery worker also needs to know how to connect to the DB and Redis
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: timetable-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: postgres:14
    container_name: timetable-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # *** THIS IS THE FIX ***
      # We must tell pg_isready WHICH database to check using the -d flag.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: timetable-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: {}