server {
    listen 80;
    server_name localhost;

    # Serve the static React build files
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # This is important for Single-Page-Apps like React to handle routing
        try_files $uri $uri/ /index.html;
    }

    # This block acts as a reverse proxy for all API data calls
    location /api/ {
        # The 'backend' hostname is the service name from docker-compose.yml
        proxy_pass http://backend:5000;
        
        # These headers are important for the backend to know about the original request
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # This is a separate block for authentication routes
    location /auth/ {
        proxy_pass http://backend:5000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: custom error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
